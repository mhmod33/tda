<section class="hero-section" [attr.dir]="direction">
  <div class="hero-bg"></div>

  <!-- Logo top-right -->
  <div class="hero-logo">
    <img src="/assets/images/logo.png" alt="شعار الهيئة" />
  </div>

  <div class="hero-content">
    <div class="hero-grid">

      <!-- Text (right side in RTL — first in DOM) -->
      <article class="hero-text" aria-label="معلومات البطل">
        <div class="hero-text-inner">
          <h1>بوابتك الرسمية لمعرفة خطط ومشروعات التنمية السياحية في مصر.</h1>
          <p>تعرف على أحدث المشروعات والفرص المتاحة في قطاع السياحة.</p>
          <div class="hero-actions">
            <button type="button" class="cta-btn">
              
              استكشف الفرص الاستثمارية
            </button>
          </div>
        </div>
      </article>

      <!-- Slider (left side in RTL — second in DOM) -->
      <aside class="hero-slider" role="region" aria-label="معرض الصور">

        <!-- Stacked cards carousel -->
        <div class="carousel-stack-wrap">
          <!-- Peek card: previous slide visible behind -->
          <div class="card-peek">
            <img [src]="slides[getPrevIndex()].src" alt="الصورة السابقة" />
          </div>
          <!-- Main active card -->
          <div class="card-main">
            <img [src]="slides[activeSlideIndex].src" [alt]="slides[activeSlideIndex].label" />
          </div>
        </div>

        <!-- Controls below the stacked cards -->
        <div class="slider-controls">
          <button type="button" class="control_btn control_btn--prev" (click)="prevSlide()" aria-label="Previous slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
          <button type="button" class="control_btn control_btn--next" (click)="nextSlide()" aria-label="Next slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
        </div>

      </aside>
    </div>
  </div>

  <app-navigation />

</section>
