<section class="hero-section" [attr.dir]="direction">
  <div class="hero-bg"></div>

  <div class="hero-content max-w-[1440px] mx-auto px-4 md:px-8 lg:px-12 py-8 lg:py-12">

    <div class="hero-grid grid gap-6 lg:grid-cols-12 items-center">
      <article class="hero-text lg:col-span-5" aria-label="معلومات البطل">
        <div class="hero-text-inner">
          <h1>بوابتك الرسمية لمعرفة خطط ومشروعات التنمية السياحية في مصر</h1>
          <p>تعرف على أحدث المشروعات والفرص المتاحة في قطاع السياحة وشاهد خارطة الطريق المستقبلية التي تدعم رؤية مصر 2030.</p>
          <div class="hero-actions">
      
            <button type="button" class="cta-btn">
              استكشف الفرص الاستثمارية
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#fff">
                <path d="M9.56994 18.8201C9.37994 18.8201 9.18994 18.7501 9.03994 18.6001L2.96994 12.5301C2.67994 12.2401 2.67994 11.7601 2.96994 11.4701L9.03994 5.40012C9.32994 5.11012 9.80994 5.11012 10.0999 5.40012C10.3899 5.69012 10.3899 6.17012 10.0999 6.46012L4.55994 12.0001L10.0999 17.5401C10.3899 17.8301 10.3899 18.3101 10.0999 18.6001C9.95994 18.7501 9.75994 18.8201 9.56994 18.8201Z" fill="white" style="fill: var(--fillg);"/>
                <path d="M20.4999 12.75H3.66992C3.25992 12.75 2.91992 12.41 2.91992 12C2.91992 11.59 3.25992 11.25 3.66992 11.25H20.4999C20.9099 11.25 21.2499 11.59 21.2499 12C21.2499 12.41 20.9099 12.75 20.4999 12.75Z" fill="white" style="fill: var(--fillg);"/>
                </svg>
            </button>
          </div>
        </div>
      </article>

      <aside class="hero-slider lg:col-span-7" role="region" aria-label="معرض الصور">
        <div class="slider-inner">
          <div
            class="slide"
            *ngFor="let slide of slides; let i = index"
            [class.active]="i === activeSlideIndex"
            aria-hidden="{{ i !== activeSlideIndex }}"
          >
            <img [src]="slide.src" [alt]="slide.label" />
            <div class="slide-meta">
              <h3>{{ slide.label }}</h3>
              <p>{{ slide.caption }}</p>
            </div>
          </div>
        </div>

        <div class="slider-controls">
          <button type="button" class="control_btn" (click)="prevSlide()" aria-label="السابق">‹</button>
          <button type="button" class="control_btn" (click)="nextSlide()" aria-label="التالي">›</button>
        </div>

        <div class="slide-dots" aria-label="تحديد الشريحة">
          <button
            *ngFor="let slide of slides; let i = index"
            type="button"
            class="dot"
            [class.active]="i === activeSlideIndex"
            (click)="goToSlide(i)"
            [attr.aria-label]="'انتقل إلى: ' + slide.label"
          ></button>
        </div>
      </aside>
    </div>
  </div>
    <app-navigation />

</section>
