<section class="hero-section" [attr.dir]="direction">
  <div class="hero-bg"></div>

  <!-- Logo top-right -->
  <div class="hero-logo">
    <img src="/assets/images/logo.png" alt="شعار الهيئة" />
  </div>

  <div class="hero-content">
    <div class="hero-grid">

      <!-- Text -->
      <article class="hero-text" aria-label="معلومات البطل">
        <div class="hero-text-inner">
          <h1 class="animate-text">بوابتك الرسمية لمعرفة خطط ومشروعات التنمية السياحية في مصر.</h1>
          <p class="animate-text-slow">تعرف على أحدث المشروعات والفرص المتاحة في قطاع السياحة.</p>
          <div class="hero-actions">
            <button type="button" class="cta-btn">
              استكشف الفرص الاستثمارية
            </button>
          </div>
        </div>
      </article>

      <!-- Slider with professional stack animation -->
      <aside class="hero-slider" role="region" aria-label="معرض الصور">
        <div class="carousel-stack-wrap">
          <div *ngFor="let slide of slides; let i = index" 
               class="card-stack"
               [class.is-active]="i === activeSlideIndex"
               [class.is-peek]="i === getPrevIndex()"
               [class.is-hidden]="i !== activeSlideIndex && i !== getPrevIndex()">
            <img [src]="slide.src" [alt]="slide.label" />
            <div class="card-overlay" *ngIf="i === activeSlideIndex">
               <h3>{{ slide.label }}</h3>
            </div>
          </div>
        </div>

        <div class="slider-controls">
          <button type="button" class="control_btn control_btn--prev" (click)="prevSlide()" aria-label="Previous slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
          <button type="button" class="control_btn control_btn--next" (click)="nextSlide()" aria-label="Next slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
        </div>
      </aside>
    </div>
  </div>

  <app-navigation />

</section>
